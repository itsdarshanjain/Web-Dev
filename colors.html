<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title>HTML Colors</title>
    </head>
    <body>
        <p style="background-color:rgb(200,200,200)">Hello Guys</p>
        <p style="background-color: #ff00ff;">Hello Guys</p>
        <p style="background-color:rgba(200,200,200,0.5)">Hello Guys</p>
        <p style="background-color:hsl(240,100%,50%)">Hello Guys</p>
        <p style="background-color:hsla(130,100%,50%,0.8)">Hello Guys</p>
    </body>
</html>
