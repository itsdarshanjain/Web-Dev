<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        table,th,td{
            border-collapse: collapse;
            border: 2px solid black;
        }
    </style>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><caption>Table Data</caption>
    <table>
        <thead>
            <tr>
            <th colspan="3">Item</th>
            <td rowspan="2">Price</td>
        </tr> 
        </thead>
        <tbody>
            <tr>
            <td>Kachori</td>
            <td>10</td>
        </tr>
        <tr>
            <td>Chocolates</td>
            <td>5</td>
        </tr>
        <tr>
            <td>Tomato</td>
            <td>15</td>
        </tr> 
        </tbody>
        <tfoot>
            <tr>
                <th colspan="3">Sum</th>
                <td>30</td>
            </tr>
        </tfoot>
        
    </table>
</body>
</html>
