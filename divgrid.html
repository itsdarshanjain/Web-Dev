<!doctype html>
<head>
  <title>Grid of Divs</title>
  <style>
    body {
      background-image: url(https://images.pexels.com/photos/27792840/pexels-photo-27792840.png);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }
    .container {
      display: grid;
      grid-template-columns: 33% 33% 33%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="background-color: lightgoldenrodyellow">
      <h1>Infograins</h1>
      <p>Infograins company is located at Atulya IT Park,Indore</p>
    </div>
    <div style="background-color: lightseagreen">
      <h1>Linkites</h1>
      <p>Linkites company is located at Crystal IT Park,Indore</p>
    </div>
    <div style="background-color: lightblue">
      <h1>World Pay</h1>
      <p>World Pay is also located at Crystal IT Park, Indore</p>
    </div>
  </div>
</body>
